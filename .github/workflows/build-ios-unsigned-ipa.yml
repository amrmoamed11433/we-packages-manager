name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      org:
        description: "Reverse-domain org prefix, for example com.yourname"
        required: true
        default: "com.yourname"
      bundle_id:
        description: "Unique iOS Bundle ID, for example com.yourname.wepackagesmanager"
        required: true
        default: "com.yourname.wepackagesmanager"
      app_name:
        description: "Visible app name on iPhone"
        required: true
        default: "WE Packages Manager"

jobs:
  build_unsigned_ipa:
    name: Build unsigned IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install Flutter stable
        shell: bash
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Show Flutter and Xcode versions
        shell: bash
        run: |
          flutter --version
          xcodebuild -version
          flutter doctor -v

      - name: Generate iOS project if missing
        shell: bash
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios --org "${{ github.event.inputs.org }}" .
          fi

      - name: Configure iOS bundle id and app name
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${{ github.event.inputs.app_name }}" ios/Runner/Info.plist || true
          perl -0777 -i -pe "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]+;/PRODUCT_BUNDLE_IDENTIFIER = ${{ github.event.inputs.bundle_id }};/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Build unsigned IPA
        shell: bash
        run: |
          flutter pub get

          set +e
          flutter build ios --release --no-codesign
          BUILD_EXIT_CODE=$?
          set -e

          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Runner.app was not created. Build failed."
            exit $BUILD_EXIT_CODE
          fi

          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/

          zip -r WE_Packages_Manager_unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WE_Packages_Manager_unsigned_ipa
          path: WE_Packages_Manager_unsigned.ipa
          if-no-files-found: error
